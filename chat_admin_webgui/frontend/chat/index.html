<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404DonkeyNotFound</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-mark">404</div>
        <div class="brand-text">
          <div class="brand-name">404DonkeyNotFound</div>
          <div class="brand-slogan">if it works, make sure donkey can break IT!</div>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="new-chat-btn" onclick="newChat()">+ New chat</button>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Projects</div>
        <div id="projectsList" class="list-stack"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Chats</div>
        <div id="chatsList" class="list-stack"></div>
      </div>

      <div class="sidebar-footer">
        <a href="/admin/">Admin</a>
        <a href="/editable/">Editable Page</a>
      </div>
    </aside>

    <main class="main-panel">
      <header class="main-topbar">
        <div>
          <div id="mainBrand" class="main-title">404DonkeyNotFound</div>
          <div id="mainSlogan" class="main-subtitle">if it works, make sure donkey can break IT!</div>
        </div>
        <div class="topbar-meta">
          <span id="activeProjectLabel">Project: General</span>
          <span id="activeModelLabel">Model: qwen3:8b</span>
          <span id="storagePathLabel">Storage: loading...</span>
        </div>
      </header>

      <section class="chat-stage">
        <div id="chatBox" class="chat-box"></div>
      </section>

      <section class="composer-wrap">
        <div class="save-row">
          <input id="chatTitle" type="text" placeholder="Chat name">
          <input id="projectName" type="text" placeholder="Project name">
          <button onclick="saveProject()">Save project</button>
          <button onclick="saveCurrentChat()">Save chat</button>
        </div>

        <div class="composer">
          <textarea id="message" rows="4" placeholder="Ask anything..."></textarea>
          <div class="composer-actions">
            <button class="primary" onclick="sendMessage()">Send</button>
            <button onclick="clearChat()">Clear</button>
          </div>
        </div>

        <pre id="status">Loading 404DonkeyNotFound...</pre>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
